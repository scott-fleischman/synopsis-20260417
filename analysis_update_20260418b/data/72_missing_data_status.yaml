remaining_limitations:
- This supplement uses the canonical_units and Thomas units already generated in the prior JTEA package as source snapshots;
  it does not newly fetch SBLGNT/MorphGNT from the internet.
- John pairwise analysis is anchor/candidate-based, not a claim of continuous verse-order dependence.
- Thomas remains curated/logion-level because automatic Coptic-Greek dependence scoring is not implemented.
- Apocrypha beyond Thomas remains outside this high-priority supplement except through prior inventory; Gospel of Peter and
  Protevangelium would require separate source ingestion.
