headline_findings:
- Matthew used Mark or a Mark-like source remains the strongest direction-level result.
- Luke used Mark is stronger than Mark used Luke among direct-use alternatives, but
  direct use over shared tradition requires explicit order-retention penalties.
- Matthew-Luke masked double tradition still behaves more like a sayings/echo layer
  than a stable narrative chain.
- Minor agreements are now separated as an explicit model-discriminating catalog for
  Q/Farrer/Griesbach/common-source/harmonization debates.
- John-Synoptic evidence is best represented as anchor-level shared tradition with
  local direct-use possibilities, not as a global monotonic chain.
- The system-model scorecard is a transparent evidence index, not a probability ranking.
