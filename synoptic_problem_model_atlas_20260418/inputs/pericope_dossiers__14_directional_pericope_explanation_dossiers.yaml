luke_used_mark:
  hypothesis:
    direction_id: luke_used_mark
    short_label: Luke used Mark
    source: Mark
    target: Luke
    pair: Mark↔Luke
    model_family: direct written narrative dependence
    current_status: supported over reverse among direct-use alternatives; medium-high with order-retention penalties
    core_required_explanations:
    - Luke preserves many Mark-like narrative sequences but adds infancy, travel narrative, and distinctive teaching material.
    - Luke omits/compresses some Markan blocks and relocates or reframes others.
    - Luke regularizes diction and style while retaining local exact or near-exact Markan phrases in some places.
    - Luke’s non-Markan material must be explained as additional source/tradition/composition rather than evidence against
      all Markan use.
    core_contrary_evidence:
    - An unpenalized shared-tradition model had lower burden than either direct-use direction.
    - Luke has major non-Markan blocks and different theological/narrative aims.
    - Some Mark–Luke parallels are low-score or could reflect common tradition.
    - The Mark–Luke data alone is not as decisive as Mark–Matthew.
    best_response_model: Luke used Mark-like narrative source selectively, combining it with other sources/traditions and
      extensive Lukan redaction; shared-tradition alternatives must pay an order-retention penalty.
