headline_findings:
- The low-verbatim domain needs a network/saying approach, not a single order-chain model.
- '1Tim 5:18 ~ Luke 10:7 is a high-value near-exact Greek Jesus-saying case: five-token exact run plus Luke-like μισθός form.'
- James 5:12 ~ Matt 5:34-37 is high-value semantically but under-scored by exact matching because of compression, expansion,
  and root/inflection differences.
- John has many anchor episodes with Synoptics, especially in passion and sign material, but direction is underdetermined
  by lexical matching alone.
- Thomas should be modeled primarily as a sayings-network witness; Coptic-to-Greek direct dependence cannot be inferred from
  semantic parallels alone.
- Many long exact NT-letter/Gospel matches are OT/scriptural or liturgical formulas and are negative-space controls, not direct
  Gospel-dependence evidence.
