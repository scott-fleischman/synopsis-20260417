- rank: 1
  claim_id: matthew_used_mark_like_source
  claim: Matthew most likely used Mark or a Mark-like written narrative source.
  confidence:
    retrieval: high
    interpretive: high
    directional: high
  support:
  - Mark-Matthew remains the strongest continuous narrative alignment in the project.
  - 'Reproducibility-patch rerun headline: 386 primary pairs, 27 loose blocks, 50
    tight blocks.'
  - Directional burden remains lower for Matthew-used-Mark than Mark-used-Matthew
    (774.87 vs 788.66 in the current burden reference).
  - Matthean expansions, discourse clustering, fulfillment material, and infancy/genealogy
    are coherent as additions to a Mark-like narrative backbone.
  counterevidence_or_limits:
