- rank: 2
  claim_id: luke_used_mark_like_source
  claim: Luke probably used Mark or a Mark-like written narrative source, but this
    conclusion is weaker than Matthew-used-Mark and must be stated with a shared-tradition
    caveat.
  confidence:
    retrieval: medium-high
    interpretive: medium-high
    directional: medium-high over Mark-used-Luke; medium against all alternatives
  support:
  - 'Direct Mark-Luke package adds the previously missing control: 183 primary-chain
    pairs, 35 loose blocks, 76 tight blocks, and 140 secondary echoes.'
  - Direct-use burden favors Mark-prior/Luke-used-Mark over Luke-prior/Mark-used-Luke
    (254.6466 vs 303.1966).
  - 'MorphGNT lemma audit strengthens rather than weakens Mark-Luke local alignment:
    mean lemma score exceeds mean surface score by about 0.0795 across primary pairs.'
  - When shared tradition is charged for dense order retention, cluster density, and
    narrative bridge retention, adjusted shared-tradition burden rises above Mark-prior
    in the moderate penalty model (385.6134 vs 254.6466).
  counterevidence_or_limits:
  - The unpenalized three-way Mark-Luke ledger favored shared narrative/oral tradition
    (164.1468) over either direct-use model.
  - Luke has substantial non-Markan material and meaningful reorderings/omissions.
  - The direct Mark-Luke signal is less extensive than the Mark-Matthew signal.
  - The conclusion depends on whether one accepts an order-retention penalty for shared
    tradition.
  best_response_model: Luke used a Mark-like narrative source selectively and combined
    it with other sources/traditions; non-direct shared-tradition accounts must explain
    retained narrative order, cluster density, and bridge sequences.
  revision_from_current_repo: Do not state simply 'Luke likely used Mark' without
    the order-retention caveat.
