    - augustinian
    - proto_mark_plus_sayings
    - oral_tradition_network
  john_specific_lowest_burden: shared_anchor_tradition

methodological_conclusion: >
  The early Christian textual field is not one tree. It is a mixed network:
  one strong written narrative backbone around Mark (used by both Matthew and
  Luke), a sayings/tradition layer behind Matthew-Luke double tradition,
  shared passion and sign traditions overlapping John, and epistolary reuse of
  fixed Jesus sayings and liturgical formulas. The two system-level
  alternatives that remain live are Two-source (with Q understood as a
  tradition layer rather than a single discrete document) and Farrer (Mark +
  Matthew -> Luke, no Q); minor agreements are the key unresolved
  discriminator between them.

strongest_individual_findings:
  directional: Matthew's dependence on Mark or a Mark-like source
  non_gospel_saying: 1 Timothy 5:18's dependence on a Luke-like worker/wages saying
  cautionary: exact verbal agreement can indicate liturgy or shared tradition rather than direct literary copying (1 Corinthians 11 / Luke 22)
  structural: shared anchor tradition wins at every John/Synoptic anchor on every pair (29/29 anchors across three pairs)
