notes:
- This rerun does not claim to settle Matthew-use-Luke versus Luke-use-Matthew.
- After explicit Markan masking, the strongest evidence remains the density of high-scoring
  nonlocal echoes, which is more consistent with a shared sayings/tradition layer
  than with a single clean monotonic dependence chain.
- The default medium regime is one auditable choice among several, not the only defensible
  mask.
