project: Matthew–Luke masked double-tradition rerun with reproducibility patch
method_summary:
  masking: Likely Markan verses removed from Matthew and Luke under three explicit
    score-threshold regimes; default regime is medium.
  updates_in_this_rerun:
  - multiple mask regimes (strict/medium/broad) with provenance
  - actual verse rows separated from canonical verse-slot counts
  - claim/evidence mapping added
  - directional totals now presented explicitly as heuristic audit prompts rather
    than directional proof
  default_parameters:
    mask_regime_default: medium
    primary_chain_min_score: 0.32
    gap_penalty: 0.05
    loose_gap_matt: 4
    loose_gap_luke: 4
    tight_gap_matt: 2
    tight_gap_luke: 2
    secondary_echo_min_score: 0.45
    secondary_echo_top_n: 120
  mask_regimes:
    strict: 0.4
    medium: 0.355
    broad: 0.325
