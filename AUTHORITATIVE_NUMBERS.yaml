# Authoritative numbers registry
#
# Single source of truth for which layer controls each headline claim.
# When a number appears in multiple packages, the entry here tells a reader
# which one is authoritative for public-facing statements and which are kept
# only for reproducibility or historical reasons.
#
# Rule of thumb:
#   - If a rerun exists (analysis_update_20260418/), it supersedes the prior
#     package for that pair.
#   - The 18b supplement (analysis_update_20260418b/) is authoritative for
#     Mark-Luke direct chain counts, John pairwise candidate pools, Gospel
#     square, Thomas matrix, epistle dossiers, and conclusion navigation.
#   - The 18c data-analysis patch (analysis_update_20260418c/) is
#     authoritative for interpretive burdens and robustness — the Mark-Luke
#     order-retention-penalty model, John *anchor-specific* (not templated)
#     burdens, Matt-Luke mask-regime robustness, Thomas curation-status
#     annotations, epistle validation-sample strata, and the MorphGNT
#     lemma audit.
#   - The directional-dossiers package
#     (synoptic_john_directional_dossiers_20260418/) is authoritative for
#     per-direction *explanatory-obligation* scores (direct-use burden by
#     direction; support/contra counts; ranked directional conclusions; per-
#     direction top material-gap burdens; John anchor-level direct-use vs.
#     shared-tradition vs. independent-convergence burdens). It does not
#     replace the 18b/18c retrieval or penalty layers; it overlays a
#     direction-by-direction "must-explain" layer on top of them.
#   - The Synoptic Problem model atlas (synoptic_problem_model_atlas_20260418/)
#     is authoritative for *system-level* model registration and comparison: the
#     13 named system-level models (Markan priority, two-source / Q-like, Farrer,
#     Griesbach, Augustinian, proto-Mark, oral-tradition network, and six more),
#     the component-direction-to-model matrix, the 16-cell gospel direction 4x4
#     matrix, the 102-unit pericope ontology, the 1,945-row per-model pericope
#     obligation ledger, the 118-row minor agreements catalog, the 109-row
#     double-tradition order catalog, the 2,682-row variant-sensitivity registry,
#     and the 25 balanced conclusion evidence/counter-evidence cards. It does not
#     replace the directional-dossiers package; it lifts its 12 directions into
#     named system-level models and evaluates each model against a single shared
#     obligation/MA/DT/variant dataset.
#   - Prior packages remain authoritative only where no rerun or supplement
#     has been produced (currently: apocrypha inventory).
#
# Any prose on this site — README, CONCLUSIONS.md, visualization pages — that
# cites a number for one of these pairs must match the `authoritative_value`
# below, or explicitly label the figure as "prior package" with a cross-link.

