# Authoritative numbers registry
#
# Single source of truth for which layer controls each headline claim.
# When a number appears in multiple packages, the entry here tells a reader
# which one is authoritative for public-facing statements and which are kept
# only for reproducibility or historical reasons.
#
# Rule of thumb:
#   - If a rerun exists (analysis_update_20260418/), it supersedes the prior
#     package for that pair.
#   - The 18b supplement (analysis_update_20260418b/) is authoritative for
#     Mark-Luke direct, John pairwise, Gospel square, Thomas matrix, epistle
#     dossiers, and conclusion navigation.
#   - Prior packages remain authoritative only where no rerun or supplement
#     has been produced (currently: apocrypha inventory).
#
# Any prose on this site — README, CONCLUSIONS.md, visualization pages — that
# cites a number for one of these pairs must match the `authoritative_value`
# below, or explicitly label the figure as "prior package" with a cross-link.

