      note: >
        The atlas 15-hypothesis registry is a strict superset of the 12 directional
        hypotheses in the dossiers package. The three additions are shared-tradition
        or lost-source hypotheses that the dossiers package treated implicitly in its
        5-model system layer; the atlas makes them first-class hypotheses so every
        system model can be composed from them.
    interpretive_caveat: >
      Every burden score in this atlas is an audit prompt, not a posterior
      probability. Model A's burden sum being lower than Model B's burden sum does
      NOT mean Model A has higher posterior probability than Model B; it means Model
      A commits a defender to fewer or cheaper pericope-level obligations under the
      atlas's selected direction set. A defender of a higher-burden model may argue
      that one or more of its obligations are acceptable under a specific extension
      — the atlas's job is to make those obligations explicit. The scorecard groups
      comparisons by model family (page 39) so burden sums are only compared inside
      comparable families; the pair-filter burden table on page 36 enforces the same
      discipline for pairwise directions.

