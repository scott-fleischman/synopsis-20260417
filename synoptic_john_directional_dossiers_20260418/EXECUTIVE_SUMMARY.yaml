headline_findings:
- 'Matthew→Mark? No: Mark-used-Matthew remains higher burden than Matthew-used-Mark because of large repeated Markan non-use
  of Matthean material.'
- Matthew used Mark / Mark-like source remains the strongest directional conclusion.
- Luke used Mark / Mark-like source is lower burden than Mark used Luke among direct-use alternatives, especially when shared
  tradition is charged for order retention.
- Matthew↔Luke double tradition remains best treated as a sayings/echo layer; neither direct direction is forced by the masked
  data.
- John should be assessed by anchor episodes; shared anchor tradition remains lower burden than global John-used-Mark/Matthew/Luke
  claims.
