project: Matthew–Luke literary dependence case study
method_summary:
  text_base: Faithlife SBLGNT text + apparatus; MorphGNT lemma/morph data
  pipeline:
  - negative-space flagging
  - full verse similarity matrix
  - 3-verse contextual windows
  - global monotonic primary chain (conservative backbone)
  - loose/tight block segmentation
  - pair-level surface and lemma diffs
  - variant attachment
  - directional burden ledger in both directions
  - secondary-echo recovery for non-monotonic parallels
  primary_chain_note: Primary chain is intentionally conservative and monotonic. Strong reordered material, especially in
    the double tradition, is expected to surface in the secondary-echo layer rather than being forced into the backbone.
